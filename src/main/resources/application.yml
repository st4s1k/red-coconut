app:
  # Provider selection
  auth:
    provider: ${AUTH_PROVIDER:oauth}

  storage:
    provider: ${STORAGE_PROVIDER:s3}  # Options: local, s3
    # Location: a bucket name for cloud storage or directory path for local storage
    location: ${STORAGE_LOCATION:./uploads}
    # Whether to use chunked uploads for large files
    use-chunked-uploads: ${STORAGE_USE_CHUNKED:true}
    # Size threshold for chunked uploads (default: 100MB)
    chunk-threshold: ${STORAGE_CHUNK_THRESHOLD:104857600}
    # Size of each chunk (default: 10MB)
    chunk-size: ${STORAGE_CHUNK_SIZE:10485760}
    
    # S3-specific configuration
    s3:
      region: ${S3_REGION:}
      endpoint-url: ${S3_ENDPOINT_URL:}
      max-parts: ${S3_MAX_PARTS:10000}

    # Local storage specific configuration
    local:
      create-if-missing: ${LOCAL_CREATE_IF_MISSING:true}
      file-permissions: ${LOCAL_FILE_PERMISSIONS:rw-r--r--}

  # CORS configuration
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:*}
    allowed-methods: ${CORS_ALLOWED_METHODS:GET,POST,PUT,DELETE,OPTIONS}

# Auth configuration
auth:
  cognito:
    client-id: ${AUTH_CLIENT_ID:}
    client-secret: ${AUTH_CLIENT_SECRET:}
    issuer-uri: ${AUTH_ISSUER_URI:}
    user-identifier-field: ${AUTH_USER_IDENTIFIER_FIELD:email}
    logout:
      uri: ${AUTH_LOGOUT_URI:}
      client-id-param: ${AUTH_LOGOUT_CLIENT_ID_PARAM:client_id}
      redirect-uri-param: ${AUTH_LOGOUT_REDIRECT_URI_PARAM:logout_uri}

# Spring configuration
spring:
  application:
    name: Red Coconut

  # Multipart file upload configuration
  servlet:
    multipart:
      max-file-size: ${MAX_FILE_SIZE:10GB}
      max-request-size: ${MAX_REQUEST_SIZE:10GB}
      resolve-lazily: true

  # OAuth2 security configuration
  security:
    oauth2:
      client:
        registration:
          cognito:
            client-id: "${AUTH_CLIENT_ID:}"
            client-secret: "${AUTH_CLIENT_SECRET:}"
            scope:
              - openid
              - email
              - profile
        provider:
          cognito:
            issuer-uri: "${AUTH_ISSUER_URI:}"
            
# Actuator configuration for health endpoints
management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when_authorized
